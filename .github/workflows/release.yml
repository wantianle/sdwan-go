name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ─── CI: vet + test on every push ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -race -count=1 ./...

  # ─── Release: build all platforms + create GitHub Release ─────
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build core binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          cd cmd/sdwan
          go build -ldflags="-s -w -X 'main.Version=${{ github.ref_name }}' -X 'main.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%S%z')'" -o "../../dist/sdwan-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/sdwan-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  # ─── Panel: Windows only ─────────────────────────────────────
  panel:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod download
        working-directory: panel
        run: go mod download

      - name: Build panel
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        working-directory: panel
        run: go build -tags production -ldflags="-s -w -H windowsgui" -o ../dist/sdwan-panel.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panel
          path: dist/sdwan-panel.exe

  # ─── GitHub Release ──────────────────────────────────────────
  publish:
    needs: [release, panel]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
