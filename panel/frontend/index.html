<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDWAN Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="panel">
    <!-- Status Header -->
    <div class="status-header">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text">
        <div class="status-label" id="status-label">已断开</div>
        <div class="status-latency" id="status-latency">--</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-connection" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Server List -->
    <div class="server-section">
      <div class="section-title">服务器线路</div>
      <div class="server-list" id="server-list">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn" id="btn-edit">编辑配置</button>
      <button class="action-btn" id="btn-reload">重新加载</button>
      <button class="action-btn" id="btn-hide">隐藏面板</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="/wails/runtime.js"></script>
</body>
</html>
